version: '3.8'

services:
  rag-qa-system:
    build: .
    container_name: rag-qa-system
    ports:
      - "8501:8501"
    volumes:
      # Persist Chroma data
      - chroma_data:/app/chroma_db
      # Persist document metadata
      - ./document_metadata.json:/app/document_metadata.json
      # Mount documents directory (optional)
      - ./documents:/app/documents
    environment:
      # LLM Configuration - override these for your setup
      - LLM_API_BASE=${LLM_API_BASE:-http://host.docker.internal:11434/v1}
      - LLM_API_KEY=${LLM_API_KEY:-not-needed}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:7b}
      # Embedding Configuration
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-m3}
      # Vector Store Configuration
      - CHROMA_PERSIST_DIR=/app/chroma_db
      # Document Configuration
      - DOCUMENTS_DIR=/app/documents
      - CHUNK_SIZE=${CHUNK_SIZE:-512}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      # Retrieval Configuration
      - TOP_K=${TOP_K:-5}
    extra_hosts:
      # Allow container to access host services
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  chroma_data:
    driver: local
